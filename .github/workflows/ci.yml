name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  node:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      # `npm ci` runs `prepare`, which builds dist/ from the TypeScript source.
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      # `pretest` rebuilds dist/, then the suite validates solveQP / solveQPFast
      # against the `quadprog` reference (an installed devDependency).
      - name: Test
        run: npm test

  bun:
    name: Bun (latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      # Bun does not run npm's `pretest` hook, so build dist/ explicitly first.
      - name: Build
        run: bun run build
      - name: Test
        run: bun test
